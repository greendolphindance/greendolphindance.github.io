<script>
document.addEventListener('DOMContentLoaded', function() {
    function changeGiscusTheme() {
        const theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';

        function sendMessage(message) {
            const iframe = document.querySelector('iframe.giscus-frame');
            if (!iframe) return;
            iframe.contentWindow.postMessage({ giscus: message }, 'https://giscus.app');
        }

        sendMessage({
            setConfig: {
                theme: theme === 'dark' ? 'noborder_dark' : 'noborder_light'
            }
        });
    }

    // 等待Giscus加载，然后尝试更改主题
    setTimeout(changeGiscusTheme, 1200); // 等待1200毫秒

    // 如果你有一个主题切换按钮或链接，你可以在这里添加事件监听器
    // 例如：
    // document.getElementById('your-theme-switch-button-id').addEventListener('click', changeGiscusTheme);
});
</script>

    <script>
        // this function is used to check current theme before page loaded.
        (() => {
            const currentTheme = window.localStorage && window.localStorage.getItem('theme') || '';
            const isDark = currentTheme === 'dark';
            const pagebody = document.getElementsByTagName('body')[0]
            if (isDark) {
                pagebody.classList.add('dark-theme');
                // mobile
                document.getElementById("mobile-toggle-theme").innerText = "· Dark"
            } else {
                pagebody.classList.remove('dark-theme');
                // mobile
                document.getElementById("mobile-toggle-theme").innerText = "· Light"
            }
        })();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    function changeGiscusTheme() {
        const theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';

        function sendMessage(message) {
            const iframe = document.querySelector('iframe.giscus-frame');
            if (!iframe) return;
            iframe.contentWindow.postMessage({ giscus: message }, 'https://giscus.app');
        }

        sendMessage({
            setConfig: {
                theme: theme === 'dark' ? 'noborder_dark' : 'noborder_light'
            }
        });
    }

    // Initialize the theme when the page loads
    changeGiscusTheme();

    // Create a mutation observer to watch for changes to the body's class list
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'class') {
                changeGiscusTheme();
            }
        });
    });

    // Start observing the body for changes to the class attribute
    observer.observe(document.body, { attributes: true });
});
</script>
